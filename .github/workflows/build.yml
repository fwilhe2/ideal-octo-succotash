name: CI Build and Upload

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            meson \
            ninja-build \
            vala \
            gcc \
            glib2-devel \
            gtk4-devel \
            libadwaita-devel \
            gettext \
            desktop-file-utils \
            libxml2

      - name: Configure Project
        # We use -Dtests=false if your project has a toggle to skip 
        # complex UI tests that might fail without a display.
        run: meson setup builddir --prefix=/usr

      - name: Build
        run: meson compile -C builddir

      - name: Run Tests
        # Added dbus-run-session to handle tests that require a bus
        run: dbus-run-session meson test -C builddir

      - name: Install to Staging Directory
        run: |
          DESTDIR=$(pwd)/staging meson install -C builddir

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-vala-app-build
          path: staging/
